<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <style>
      .node { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .container { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2; rx: 10; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #1e293b; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #0f172a; }
      .edge { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">OpenClaw + Cognee Architecture</text>

  <!-- Docker Container -->
  <rect x="650" y="80" width="120" height="100" class="container"/>
  <text x="710" y="105" class="label" text-anchor="middle">Docker</text>
  <text x="710" y="125" class="label" text-anchor="middle"> Cognee</text>
  <text x="710" y="145" class="label" text-anchor="middle" font-size="11">:8000</text>

  <!-- Cognee Plugin -->
  <rect x="300" y="80" width="120" height="100" class="container"/>
  <text x="360" y="105" class="label" text-anchor="middle">Cognee</text>
  <text x="360" y="125" class="label" text-anchor="middle">Plugin</text>
  <text x="360" y="145" class="label" text-anchor="middle" font-size="11">openclaw</text>

  <!-- Agent -->
  <rect x="100" y="80" width="120" height="100" class="container"/>
  <text x="160" y="105" class="label" text-anchor="middle">OpenClaw</text>
  <text x="160" y="125" class="label" text-anchor="middle">Agent</text>
  <text x="160" y="145" class="label" text-anchor="middle" font-size="11">auto-index</text>

  <!-- Knowledge Graph -->
  <rect x="250" y="220" width="300" height="120" class="container"/>
  <text x="400" y="245" class="label" text-anchor="middle">Knowledge Graph</text>

  <!-- Graph nodes -->
  <circle cx="320" cy="270" r="20" class="node"/>
  <text x="320" y="274" class="label" text-anchor="middle">MEMORY</text>

  <circle cx="400" cy="270" r="20" class="node"/>
  <text x="400" y="274" class="label" text-anchor="middle">2026-03-17</text>

  <circle cx="480" cy="270" r="20" class="node"/>
  <text x="480" y="274" class="label" text-anchor="middle">2026-03-18</text>

  <circle cx="360" cy="300" r="15" class="node"/>
  <text x="360" y="303" class="label" text-anchor="middle" font-size="10">cognee-setup</text>

  <circle cx="440" cy="300" r="15" class="node"/>
  <text x="440" y="303" class="label" text-anchor="middle" font-size="10">linkedin-auth</text>

  <circle cx="400" cy="330" r="15" class="node"/>
  <text x="400" y="333" class="label" text-anchor="middle" font-size="10">content-pipeline</text>

  <!-- Edges between graph nodes -->
  <line x1="320" y1="270" x2="400" y2="270" class="edge"/>
  <line x1="400" y1="270" x2="480" y2="270" class="edge"/>
  <line x1="360" y1="270" x2="360" y2="300" class="edge"/>
  <line x1="440" y1="270" x2="440" y2="300" class="edge"/>
  <line x1="400" y1="270" x2="400" y2="330" class="edge"/>
  <line x1="360" y1="300" x2="400" y2="330" class="edge"/>
  <line x1="440" y1="300" x2="400" y2="330" class="edge"/>

  <!-- Connections -->
  <line x1="220" y1="130" x2="300" y2="130" class="edge"/>
  <line x1="420" y1="130" x2="550" y2="130" class="edge"/>
  <line x1="400" y1="180" x2="400" y2="220" class="edge"/>

  <!-- Data flow label -->
  <text x="400" y="115" class="label" text-anchor="middle" font-size="11">auto-recall</text>
  <text x="400" y="205" class="label" text-anchor="middle" font-size="11">context injection</text>
</svg>
